<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0e14">
<title>مؤقت الطالب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0d1b2a; --panel:#122438; --accent:#ffb400; --muted:#5f8aa6; --border:#1c344a; --green:#2ecc71; }
  body[data-theme="aurora"]{ --accent:#00d4aa; }
  body[data-theme="ember"]{ --accent:#ff6b35; }
  body[data-theme="arctic"]{ --accent:#48cae4; }
  body[data-theme="royal"]{ --accent:#ffd60a; }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:#f2f4f8; font-family:'Tajawal',sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .back-link{
    position:fixed; top:18px; inset-inline-start:18px; font-size:13px; color:var(--muted);
    text-decoration:none;
  }
  .card{
    width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; text-align:center;
  }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--accent);
    text-transform:uppercase; margin:0 0 8px; }
  h1{margin:0 0 22px; font-size:20px; font-weight:900;}

  .presets{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
  .preset-btn{
    padding:12px 4px; border-radius:10px; border:1px solid var(--border); background:#0f2032;
    color:#fff; font-family:'JetBrains Mono',monospace; font-weight:700; cursor:pointer; font-size:14px;
  }
  .preset-btn.active{border-color:var(--accent); color:var(--accent); background:rgba(72,202,228,.1);}

  .custom-row{display:flex; gap:8px; margin-bottom:20px;}
  .custom-row input{
    flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0f2032;
    color:#fff; font-family:'Tajawal',sans-serif; font-size:14.5px;
  }

  .digits{display:flex; justify-content:center; gap:10px; margin-bottom:22px; display:none;}
  .unit{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .flip{
    background:#0a1826; border:1px solid var(--border); border-radius:10px;
    padding:14px 8px; min-width:82px; font-family:'JetBrains Mono',monospace;
    font-size:38px; font-weight:700; color:var(--accent);
  }
  .unit label{font-size:11px; color:var(--muted); letter-spacing:2px;}

  .controls{display:flex; gap:8px;}
  button.primary{
    flex:1; padding:14px; border:none; border-radius:10px; background:var(--accent);
    color:#06222d; font-weight:900; font-size:15px; cursor:pointer; font-family:'Tajawal',sans-serif;
  }
  button.secondary{
    flex:1; padding:14px; border:1px solid var(--border); border-radius:10px; background:transparent;
    color:var(--muted); font-weight:700; font-size:14px; cursor:pointer; font-family:'Tajawal',sans-serif;
  }
  #doneMsg{display:none; font-size:20px; font-weight:900; color:var(--green); margin-bottom:14px;}
  .hidden{display:none !important;}

  /* الأنماط: مستقلة عن باقي المؤقتات */
  :root{--ring-pct:0%;}
  body[data-style="circular"] .digits{gap:14px;}
  body[data-style="circular"] .flip{
    border-radius:50%; width:78px; height:78px; min-width:78px;
    display:flex; align-items:center; justify-content:center; padding:0;
    border:2px solid var(--accent); background:#0a1826; font-size:22px;
  }

  body[data-style="pixel"] .eyebrow, body[data-style="pixel"] h1, body[data-style="pixel"] .unit label{font-family:'Press Start 2P', monospace;}
  body[data-style="pixel"] h1{font-size:14px; line-height:1.8;}
  body[data-style="pixel"] .eyebrow{font-size:9px;}
  body[data-style="pixel"] .unit label{font-size:7px;}
  body[data-style="pixel"] .card{background:#000; border-color:#003300;}
  body[data-style="pixel"] .flip{
    font-family:'Press Start 2P', monospace; font-size:18px; border-radius:0;
    border:3px solid var(--accent); background:#000;
  }

  body[data-style="neon"] .card{background:#050507;}
  body[data-style="neon"] .digits{gap:22px;}
  body[data-style="neon"] .flip{
    background:transparent; border:none; font-size:44px; letter-spacing:2px;
    text-shadow:0 0 8px var(--accent), 0 0 22px var(--accent), 0 0 40px var(--accent);
  }

  body[data-style="ring"] .digits{
    position:relative; width:220px; height:220px; border-radius:50%; margin:0 auto 22px;
    align-items:center; padding:24px; gap:2px; display:flex;
    background: conic-gradient(var(--accent) var(--ring-pct), #0a1826 0);
  }
  body[data-style="ring"] .digits::before{
    content:""; position:absolute; inset:10px; border-radius:50%; background:var(--panel);
  }
  body[data-style="ring"] .flip{ position:relative; z-index:1; background:transparent; border:none; font-size:22px; min-width:auto; padding:0 2px;}
  body[data-style="ring"] .unit{ position:relative; z-index:1; }
  body[data-style="ring"] .unit label{ font-size:9px;}

  body[data-style="digital"] .card{background:#000; border:none;}
  body[data-style="digital"] .digits{gap:4px;}
  body[data-style="digital"] .flip{ background:transparent; border:none; font-size:52px; min-width:auto; padding:4px 6px; color:#fff;}
  body[data-style="digital"] .unit label{ display:none; }

  body[data-style="dotmatrix"] .card{background:#000; border-color:#141414;}
  body[data-style="dotmatrix"] .flip{
    background:radial-gradient(circle, rgba(255,140,26,.12) 1px, transparent 1.5px) 0 0/6px 6px, #050505;
    border:2px solid #1a1a1a; border-radius:4px; color:#ff8c1a;
    text-shadow:0 0 6px #ff8c1a, 0 0 14px rgba(255,140,26,.5);
  }
  body[data-style="dotmatrix"] .unit label{ color:#a3651f; }
</style>
</head>
<body>

<a href="index.html" class="back-link">‹ الرئيسية</a>

<div class="card">
  <p class="eyebrow">📚 مؤقت الطالب</p>
  <h1>اضبط وقت دراستك</h1>

  <div id="setupView">
    <div class="presets">
      <button class="preset-btn" onclick="pickPreset(5, this)">٥ د</button>
      <button class="preset-btn active" onclick="pickPreset(15, this)">١٥ د</button>
      <button class="preset-btn" onclick="pickPreset(25, this)">٢٥ د</button>
      <button class="preset-btn" onclick="pickPreset(45, this)">٤٥ د</button>
    </div>
    <div class="custom-row">
      <input type="time" id="customTime" step="60">
    </div>
    <p style="font-size:11.5px; color:var(--muted); margin:-14px 0 20px;">أو حدد وقتًا مخصصًا (ساعة : دقيقة) — بحد أقصى 23:59</p>
    <button class="primary" onclick="startTimer()">▶️ ابدأ الدراسة</button>
  </div>

  <div id="runningView" class="hidden">
    <p id="doneMsg">🎉 أحسنت! انتهت جلسة الدراسة</p>
    <div class="digits" id="digitsWrap" style="display:flex;">
      <div class="unit"><div class="flip" id="dHours">00</div><label>ساعة</label></div>
      <div class="unit"><div class="flip" id="dMinutes">00</div><label>دقيقة</label></div>
      <div class="unit"><div class="flip" id="dSeconds">00</div><label>ثانية</label></div>
    </div>
    <div class="controls">
      <button class="secondary" id="pauseBtn" onclick="togglePause()">⏸️ إيقاف مؤقت</button>
      <button class="secondary" onclick="resetTimer()">🔄 إعادة ضبط</button>
    </div>
  </div>
</div>

<script src="timer-sounds.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
let selectedMinutes = 15;
let remainingMs = 0;
let totalMs = 0;
let paused = false;
let timerHandle = null;
let midAlerted = false, lastMinuteAlerted = false;
const baseTitle = document.title;

const pad = (n) => String(Math.max(0, n)).padStart(2, "0");

function formatDuration(ms){
  ms = Math.max(0, ms);
  const totalSeconds = Math.floor(ms / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  return `${pad(minutes)}:${pad(seconds)}`;
}

/* إبقاء الشاشة مضيئة أثناء جلسة الدراسة */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if ("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
    }
  }catch(e){ /* غير مدعوم، تجاهل بصمت */ }
}
document.addEventListener("visibilitychange", () => {
  if (wakeLock !== null && document.visibilityState === "visible") requestWakeLock();
});

const firebaseConfig = {
  apiKey: "AIzaSyDoZPCTfHBg-gCupUOd6FPqMMiJm4jT1vA",
  authDomain: "time-7971c.firebaseapp.com",
  databaseURL: "https://time-7971c-default-rtdb.firebaseio.com",
  projectId: "time-7971c",
  storageBucket: "time-7971c.firebasestorage.app",
  messagingSenderId: "511397609426",
  appId: "1:511397609426:web:06ce68a87617922c68120b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref('studentSettings/style').on('value', (snapshot) => {
  document.body.setAttribute("data-style", snapshot.val() || "default");
});

db.ref('themeSettings/theme').on('value', (snapshot) => {
  document.body.setAttribute("data-theme", snapshot.val() || "broadcast");
});

function setRingProgress(pct){
  pct = Math.max(0, Math.min(100, pct));
  document.body.style.setProperty('--ring-pct', pct + '%');
}

window.pickPreset = function(minutes, el){
  selectedMinutes = minutes;
  document.getElementById("customTime").value = "";
  document.querySelectorAll(".preset-btn").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
};

window.startTimer = function(){
  const customVal = document.getElementById("customTime").value; // "HH:MM"
  let minutes = selectedMinutes;
  if (customVal){
    const [hh, mm] = customVal.split(":").map(Number);
    const customMinutes = (hh * 60) + mm;
    if (customMinutes > 0) minutes = customMinutes;
  }

  totalMs = minutes * 60 * 1000;
  remainingMs = totalMs;
  paused = false;
  midAlerted = false;
  lastMinuteAlerted = false;

  document.getElementById("setupView").classList.add("hidden");
  document.getElementById("runningView").classList.remove("hidden");
  document.getElementById("doneMsg").style.display = "none";
  document.getElementById("digitsWrap").style.display = "flex";
  document.getElementById("pauseBtn").innerText = "⏸️ إيقاف مؤقت";

  window.playTimerAlert("start");
  setRingProgress(100);
  renderTime();
  requestWakeLock();
  if (timerHandle) clearInterval(timerHandle);
  timerHandle = setInterval(step, 1000);
};

function step(){
  if (paused) return;
  remainingMs -= 1000;

  if (remainingMs <= 0){
    clearInterval(timerHandle);
    remainingMs = 0;
    renderTime();
    setRingProgress(0);
    window.playTimerAlert("finish");
    document.getElementById("digitsWrap").style.display = "none";
    document.getElementById("doneMsg").style.display = "block";
    document.title = "🎉 انتهت الجلسة";
    if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
    return;
  }

  const progress = 1 - (remainingMs / totalMs);
  if (progress >= 0.5 && !midAlerted){ midAlerted = true; window.playTimerAlert("mid"); }
  if (remainingMs <= 60000 && !lastMinuteAlerted){ lastMinuteAlerted = true; window.playTimerAlert("lastMinute"); }

  setRingProgress((remainingMs / totalMs) * 100);
  renderTime();
  document.title = "📚 " + formatDuration(remainingMs);
}

function renderTime(){
  const totalSeconds = Math.floor(remainingMs / 1000);
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  document.getElementById("dHours").innerText = pad(hours);
  document.getElementById("dMinutes").innerText = pad(minutes);
  document.getElementById("dSeconds").innerText = pad(seconds);
}

window.togglePause = function(){
  paused = !paused;
  document.getElementById("pauseBtn").innerText = paused ? "▶️ استئناف" : "⏸️ إيقاف مؤقت";
};

window.resetTimer = function(){
  if (timerHandle) clearInterval(timerHandle);
  document.getElementById("setupView").classList.remove("hidden");
  document.getElementById("runningView").classList.add("hidden");
  document.title = baseTitle;
  if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
};
</script>
</body>
</html>
