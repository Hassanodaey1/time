<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العداد التنازلي</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .admin-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input {
            background: #0f172a;
            color: #fff;
            border: 1px solid #334155;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #0ea5e9; }
        #status { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>لوحة التحكم بالعداد</h2>
        <p>حدد وقت انتهاء الحدث:</p>
        <input type="datetime-local" id="datetimePicker">
        <button onclick="updateTargetTime()">تحديث العداد الآن</button>
        <div id="status"></div>
    </div>

    <!-- استدعاء Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ضع بيانات مشروعك هنا بدقة
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.updateTargetTime = function() {
            const val = document.getElementById("datetimePicker").value;
            const statusDiv = document.getElementById("status");

            if (!val) {
                statusDiv.style.color = "#f87171";
                statusDiv.innerText = "يرجى اختيار الوقت أولاً!";
                return;
            }

            const targetTimestamp = new Date(val).getTime();

            set(ref(db, 'countdown/targetTime'), targetTimestamp)
                .then(() => {
                    statusDiv.style.color = "#4ade80";
                    statusDiv.innerText = "تم تحديث العداد بنجاح في القناة!";
                })
                .catch((error) => {
                    statusDiv.style.color = "#f87171";
                    statusDiv.innerText = "فشل التحديث: " + error.message;
                });
        };
    </script>
</body>
</html>
