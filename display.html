<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0e14">
<title>المؤقت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --panel:#12161f; --amber:#ffb400; --red:#ff3b30; --muted:#7d8698; --border:#232838;
  }
  body[data-theme="aurora"]{ --amber:#00d4aa; }
  body[data-theme="ember"]{ --amber:#ff6b35; }
  body[data-theme="arctic"]{ --amber:#48cae4; }
  body[data-theme="royal"]{ --amber:#ffd60a; }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:#f2f4f8; font-family:'Tajawal',sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(255,180,0,0.05), transparent 42%),
      radial-gradient(circle at 85% 85%, rgba(255,59,48,0.05), transparent 42%);
    transition: background-color .6s ease;
  }
  .monitor{ transition: background-color .6s ease, border-color .6s ease; }
  .flip{ transition: color .6s ease, background-color .6s ease; }
  .monitor{
    width:100%; max-width:640px; background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:36px 28px; text-align:center; position:relative; overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,.55);
  }
  .monitor::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.05;
    background:repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px);
  }
  .tally{display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px;}
  .tally .dot{width:9px;height:9px;border-radius:50%;background:var(--red); box-shadow:0 0 10px var(--red); animation:pulse 1.4s infinite;}
  .tally span{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  #eventTitle{font-size:19px; font-weight:900; margin:0 0 26px; color:#fff; min-height:24px;}

  .digits{display:flex; justify-content:center; gap:10px; flex-wrap:wrap;}
  .unit{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .flip{
    background:#0e1119; border:1px solid var(--border); border-radius:10px;
    padding:14px 6px; min-width:78px; font-family:'JetBrains Mono',monospace;
    font-size:38px; font-weight:700; color:var(--amber);
    text-shadow:0 0 18px rgba(255,180,0,.35);
  }
  .unit label{font-size:11px; color:var(--muted); letter-spacing:2px;}

  /* نمط دائري: كل رقم داخل دائرة كاملة، بلا زوايا وبلا صندوق مستطيل */
  body[data-style="circular"] .monitor{border-radius:50%; aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;}
  body[data-style="circular"] .digits{gap:14px;}
  body[data-style="circular"] .flip{
    border-radius:50%; width:88px; height:88px; min-width:88px;
    display:flex; align-items:center; justify-content:center; padding:0;
    border:2px solid var(--amber); background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.06), #0e1119 70%);
    font-size:26px;
  }
  body[data-style="circular"] .unit label{margin-top:2px;}

  /* نمط بكسل: طابع رجعي/شاشة أرشيف قديمة بالكامل */
  body[data-style="pixel"] .monitor{background:#000; border:2px solid #003300; border-radius:4px; box-shadow:none;}
  body[data-style="pixel"] .monitor::before{
    background:repeating-linear-gradient(0deg, rgba(0,255,0,.05) 0px, rgba(0,255,0,.05) 1px, transparent 1px, transparent 3px);
    opacity:1;
  }
  body[data-style="pixel"] #eventTitle{color:var(--amber); font-family:'Press Start 2P', monospace; font-size:13px; line-height:1.8;}
  body[data-style="pixel"] .tally span{font-family:'Press Start 2P', monospace; font-size:9px;}
  body[data-style="pixel"] .flip{
    font-family:'Press Start 2P', monospace; font-size:20px; border-radius:0;
    border:3px solid var(--amber); text-shadow:none; image-rendering:pixelated;
    background:#000;
  }
  body[data-style="pixel"] .unit label{font-family:'Press Start 2P', monospace; font-size:8px;}

  /* نمط نيون: بدون أي صندوق، توهج قوي على خلفية داكنة بالكامل */
  body[data-style="neon"] .monitor{background:#050507; border:1px solid rgba(255,255,255,.08); box-shadow:0 0 60px rgba(0,0,0,.8);}
  body[data-style="neon"] .monitor::before{display:none;}
  body[data-style="neon"] #eventTitle{text-shadow:0 0 10px var(--amber);}
  body[data-style="neon"] .digits{gap:22px;}
  body[data-style="neon"] .flip{
    background:transparent; border:none; font-size:48px; letter-spacing:2px;
    text-shadow:0 0 8px var(--amber), 0 0 22px var(--amber), 0 0 40px var(--amber);
  }
  body[data-style="neon"] .unit label{text-shadow:0 0 6px var(--amber);}

  /* نمط حلقي: حلقة تقدّم دائرية حقيقية تتحرك حسب الوقت */
  :root{--ring-pct:0%;}
  body[data-style="ring"] .monitor{
    border-radius:50%; aspect-ratio:1/1; width:340px; max-width:92vw;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:28px; border:none; position:relative;
    background:
      conic-gradient(var(--amber) var(--ring-pct), #1a1e29 0),
      radial-gradient(circle, var(--panel) 62%, transparent 63%);
  }
  body[data-style="ring"] .monitor::before{display:none;}
  body[data-style="ring"] .tally{position:absolute; top:20px; inset-inline-end:26px; margin:0;}
  body[data-style="ring"] #eventTitle{font-size:13px; margin:0 0 6px; max-width:70%;}
  body[data-style="ring"] .digits{gap:2px; flex-wrap:wrap; max-width:64%;}
  body[data-style="ring"] .flip{
    background:transparent; border:none; box-shadow:none; text-shadow:none;
    font-size:26px; min-width:auto; padding:0 2px; color:#fff;
  }
  body[data-style="ring"] .unit label{font-size:9px;}

  /* نمط رقمي بسيط: أرقام بيضاء ضخمة على أسود صافٍ */
  body[data-style="digital"] .monitor{background:#000; border:none; box-shadow:none; border-radius:14px; position:relative;}
  body[data-style="digital"] .monitor::before{display:none;}
  body[data-style="digital"] .monitor::after{
    content:"🔔"; position:absolute; top:16px; inset-inline-start:20px; font-size:17px; opacity:.85;
  }
  body[data-style="digital"] .tally{display:none;}
  body[data-style="digital"] #eventTitle{display:none;}
  body[data-style="digital"] .digits{gap:4px;}
  body[data-style="digital"] .flip{
    background:transparent; border:none; box-shadow:none; text-shadow:none;
    font-size:58px; color:#fff; min-width:auto; padding:6px 8px;
  }
  body[data-style="digital"] .unit label{display:none;}

  /* نمط نقطي: طابع لوحة LED نقطية كهرمانية */
  body[data-style="dotmatrix"] .monitor{background:#000; border:6px solid #141414; border-radius:6px; box-shadow:0 20px 50px rgba(0,0,0,.6);}
  body[data-style="dotmatrix"] .monitor::before{
    background:repeating-radial-gradient(circle, rgba(255,140,26,.05) 0px, rgba(255,140,26,.05) 1px, transparent 1px, transparent 4px);
  }
  body[data-style="dotmatrix"] #eventTitle{color:#ff8c1a;}
  body[data-style="dotmatrix"] .flip{
    background:radial-gradient(circle, rgba(255,140,26,.10) 1px, transparent 1.5px) 0 0/6px 6px, #050505;
    border:2px solid #1a1a1a; border-radius:4px; color:#ff8c1a;
    text-shadow:0 0 6px #ff8c1a, 0 0 16px rgba(255,140,26,.55);
  }
  body[data-style="dotmatrix"] .unit label{color:#a3651f;}

  /* نمط فليب كلوك: شاشة داكنة بالكامل وأرقام تنقلب مثل الساعات القديمة */
  body[data-style="flipclock"]{ background:#000; }
  body[data-style="flipclock"] .monitor{ background:#000; border:none; box-shadow:none; }
  body[data-style="flipclock"] .monitor::before{ display:none; }
  body[data-style="flipclock"] .tally span{ color:#4a5a6a; }
  body[data-style="flipclock"] #eventTitle{ color:#8aa0b8; }
  body[data-style="flipclock"] .digits{ gap:8px; }
  body[data-style="flipclock"] .unit{ perspective:300px; }
  body[data-style="flipclock"] .unit label{ color:#4a5a6a; }
  body[data-style="flipclock"] .flip{
    position:relative; background:#14191f; border:none; border-radius:10px;
    color:#4aa8ff; font-size:56px; min-width:76px; padding:18px 8px;
    text-shadow:0 0 14px rgba(74,168,255,.55);
    box-shadow:0 8px 18px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    overflow:hidden; transform-style:preserve-3d;
  }
  body[data-style="flipclock"] .flip::before{
    content:""; position:absolute; left:0; right:0; top:50%; height:2px;
    background:#000; transform:translateY(-1px); z-index:2;
  }
  body[data-style="flipclock"] .flip::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(255,255,255,.03) 0%, transparent 48%, rgba(0,0,0,.18) 52%, rgba(0,0,0,.3) 100%);
    pointer-events:none;
  }
  body[data-style="flipclock"] .flip.flip-anim{ animation:flipDigit .5s ease; }
  @keyframes flipDigit{
    0%{ transform:rotateX(0deg); }
    48%{ transform:rotateX(-90deg); opacity:.5; }
    52%{ transform:rotateX(90deg); opacity:.5; }
    100%{ transform:rotateX(0deg); opacity:1; }
  }

  #finishedMsg{display:none; font-size:22px; font-weight:900; color:var(--red); margin-top:10px;}
  #loadingMsg{color:var(--muted); font-size:14px; font-family:'JetBrains Mono',monospace;}
  .back-link{
    position:fixed; top:18px; inset-inline-start:18px; font-family:'Tajawal',sans-serif;
    font-size:13px; color:var(--muted); text-decoration:none; opacity:.7;
  }
  .back-link:hover{opacity:1;}
  .fs-btn{
    position:fixed; top:18px; inset-inline-end:18px; width:36px; height:36px; border-radius:9px;
    background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--muted);
    font-size:16px; cursor:pointer; z-index:5;
  }
  .fs-btn:hover{color:#fff; border-color:var(--amber);}
  .offline-msg{
    display:none; font-size:11.5px; color:var(--red); background:rgba(255,59,48,.1);
    border:1px solid rgba(255,59,48,.3); border-radius:8px; padding:6px 10px; margin:0 0 12px;
  }

  @media (max-width:480px){
    .flip{min-width:60px; font-size:26px; padding:10px 4px;}
  }

  /* ================= الحاسبة العلمية العائمة ================= */
  .calc-fab{
    position:fixed; bottom:18px; inset-inline-end:18px; width:50px; height:50px; border-radius:50%;
    background:var(--panel); border:1px solid var(--border); color:var(--amber); font-size:20px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:20;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
  }
  .calc-fab:active{transform:scale(0.94);}
  .calc-overlay{
    position:fixed; inset:0; background:rgba(3,8,14,.75); display:none; align-items:center;
    justify-content:center; padding:20px; z-index:30;
  }
  .calc-overlay.show{display:flex;}
  .calc-modal{
    width:100%; max-width:340px; max-height:88vh; overflow-y:auto; background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:16px; text-align:center;
  }
  .calc-modal .calc-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .calc-modal .calc-head h2{margin:0; font-size:14px; font-weight:900;}
  .calc-close{background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1;}
  .calc-screen{
    background:#0f2032; border:1px solid var(--border); border-radius:12px; padding:12px 12px;
    margin-bottom:10px; text-align:end; min-height:60px; display:flex; flex-direction:column; justify-content:center;
  }
  .calc-expr{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted); min-height:15px; word-break:break-all;}
  .calc-result{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:900; word-break:break-all;}
  .calc-status{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:8px; padding:0 2px;}
  .calc-status span.on{color:var(--amber); font-weight:900;}
  .calc-sci-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:8px;}
  .calc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .calc-btn{
    padding:11px 0; border-radius:9px; border:1px solid var(--border); background:#0f2032; color:#fff;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; cursor:pointer;
  }
  .calc-grid .calc-btn{padding:14px 0; font-size:15px;}
  .calc-btn:active{transform:scale(0.95);}
  .calc-btn.op{color:var(--amber); border-color:var(--amber);}
  .calc-btn.fn{color:var(--muted); font-size:12.5px;}
  .calc-sci-grid .calc-btn.fn{font-size:11.5px; padding:9px 0;}
  .calc-btn.mode{color:#06222d; background:var(--amber); border-color:var(--amber); font-size:11px;}
  .calc-btn.eq{background:var(--amber); color:#06222d; border-color:var(--amber);}
  .calc-btn.zero{grid-column:span 2;}
</style>
</head>

<script>
// نفس بيانات مشروعك الموجودة في admin.html
const firebaseConfig = {
  apiKey: "AIzaSyDoZPCTfHBg-gCupUOd6FPqMMiJm4jT1vA",
  authDomain: "time-7971c.firebaseapp.com",
  databaseURL: "https://time-7971c-default-rtdb.firebaseio.com",
  projectId: "time-7971c",
  storageBucket: "time-7971c.firebasestorage.app",
  messagingSenderId: "511397609426",
  appId: "1:511397609426:web:06ce68a87617922c68120b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let mode = "down";
let targetTime = null;
let startTime = null;
let timerHandle = null;
let lastLoadedTargetTime = null;
let lastMinuteAlerted = false;
let finishedAlerted = false;
let serverTimeOffset = 0;
const baseTitle = document.title;

const pad = (n) => String(Math.max(0, n)).padStart(2, "0");

function serverNow(){ return Date.now() + serverTimeOffset; }

function formatDuration(ms){
  ms = Math.max(0, ms);
  const totalSeconds = Math.floor(ms / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  if (days > 0) return `${days}ي ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  if (hours > 0) return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  return `${pad(minutes)}:${pad(seconds)}`;
}

db.ref(".info/serverTimeOffset").on("value", (snap) => {
  serverTimeOffset = snap.val() || 0;
});

db.ref(".info/connected").on("value", (snap) => {
  document.getElementById("offlineMsg").style.display = (snap.val() === true) ? "none" : "block";
});

/* إبقاء الشاشة مضيئة أثناء العرض */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if ("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
    }
  }catch(e){ /* غير مدعوم على هذا المتصفح، تجاهل بصمت */ }
}
requestWakeLock();
document.addEventListener("visibilitychange", () => {
  if (wakeLock !== null && document.visibilityState === "visible") requestWakeLock();
});

/* ملء الشاشة */
window.toggleFullscreen = function(){
  try{
    if (!document.fullscreenElement){
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }catch(e){ /* غير مدعوم، تجاهل */ }
};
if (!document.documentElement.requestFullscreen){
  document.getElementById("fullscreenBtn").style.display = "none";
}

function setRingProgress(pct){
  pct = Math.max(0, Math.min(100, pct));
  document.body.style.setProperty('--ring-pct', pct + '%');
}

function tick(){
  if (targetTime === null) return;
  const now = serverNow();
  const total = targetTime - startTime;

  if (mode === "down"){
    let diff = targetTime - now;
    if (diff <= 0){
      if (!finishedAlerted){ finishedAlerted = true; window.playTimerAlert("finish"); }
      clearInterval(timerHandle);
      document.getElementById("digitsWrap").style.display = "none";
      document.getElementById("finishedMsg").style.display = "block";
      setRingProgress(0);
      document.title = "🏁 انتهى الوقت";
      return;
    }
    if (diff <= 60000 && !lastMinuteAlerted){
      lastMinuteAlerted = true;
      window.playTimerAlert("lastMinute");
    }
    renderDigits(diff);
    document.title = "⏳ " + formatDuration(diff);
    if (total > 0) setRingProgress((diff / total) * 100);
    return;
  }

  // mode === "up": يبدأ من صفر عند لحظة آخر حفظ للمؤقت، ويزداد حتى يصل الوقت المحدد
  const remaining = targetTime - now;
  const elapsed = now - startTime;

  if (remaining <= 0){
    if (!finishedAlerted){ finishedAlerted = true; window.playTimerAlert("finish"); }
    clearInterval(timerHandle);
    document.getElementById("digitsWrap").style.display = "none";
    document.getElementById("finishedMsg").style.display = "block";
    setRingProgress(100);
    document.title = "🏁 انتهى الوقت";
    return;
  }
  if (remaining <= 60000 && !lastMinuteAlerted){
    lastMinuteAlerted = true;
    window.playTimerAlert("lastMinute");
  }
  renderDigits(Math.max(0, elapsed));
  document.title = "⏱️ " + formatDuration(elapsed);
  if (total > 0) setRingProgress((elapsed / total) * 100);
}

function setDigit(el, val){
  if (el.innerText !== val){
    el.innerText = val;
    if (document.body.getAttribute("data-style") === "flipclock"){
      el.classList.remove("flip-anim");
      void el.offsetWidth; /* إعادة تشغيل الأنيميشن */
      el.classList.add("flip-anim");
    }
  }
}

function renderDigits(diff){
  diff = Math.max(0, diff);
  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  setDigit(document.getElementById("dDays"), pad(days));
  setDigit(document.getElementById("dHours"), pad(hours));
  setDigit(document.getElementById("dMinutes"), pad(minutes));
  setDigit(document.getElementById("dSeconds"), pad(seconds));
}

db.ref('countdown').on('value', (snapshot) => {
  const data = snapshot.val();
  document.getElementById("loadingMsg").style.display = "none";

  if (!data || !data.targetTime){
    document.getElementById("loadingMsg").style.display = "block";
    document.getElementById("loadingMsg").innerText = "لم يتم ضبط المؤقت بعد.";
    document.title = baseTitle;
    return;
  }

  mode = data.mode === "up" ? "up" : "down";
  targetTime = data.targetTime;
  startTime = data.updatedAt || (targetTime - 3600000);
  if (targetTime !== lastLoadedTargetTime){
    lastLoadedTargetTime = targetTime;
    lastMinuteAlerted = false;
    finishedAlerted = false;
  }
  document.body.setAttribute("data-style", data.style || "default");
  document.getElementById("eventTitle").innerText = data.title || "";
  document.getElementById("modeLabel").innerText = mode === "down" ? "عد تنازلي" : "عد تصاعدي";
  document.getElementById("finishedMsg").style.display = "none";
  document.getElementById("digitsWrap").style.display = "flex";

  if (timerHandle) clearInterval(timerHandle);
  tick();
  timerHandle = setInterval(tick, 1000);
});

db.ref('themeSettings/theme').on('value', (snapshot) => {
  document.body.setAttribute("data-theme", snapshot.val() || "broadcast");
});
</script>

<script>
/* ================= الحاسبة العلمية العائمة ================= */
/* محرك حساب آمن بالكامل — بدون eval(). يدعم: + - × ÷ ^ ( ) √ ∛ x² x³ 1/x x!
   sin cos tan sin⁻¹ cos⁻¹ tan⁻¹ log ln π e nPr nCr % Ans ذاكرة (M+ M- MR MC) وضع درجة/راديان.
   كل خطأ رياضي (قسمة على صفر، جذر لعدد سالب، log لعدد غير موجب، مدى دوال معكوسة...) يُرصد
   ويُعرض "خطأ" بدل نتيجة غير صحيحة — لا يوجد أي احتمال لإرجاع رقم رياضياً خاطئ. */
let calcExpr = "";
let calcMode = "DEG"; // "DEG" أو "RAD"
let calcMemory = 0;
let calcAns = 0;

window.openCalc = function(){
  document.getElementById("calcOverlay").classList.add("show");
  calcUpdateStatus();
};
window.closeCalc = function(){
  document.getElementById("calcOverlay").classList.remove("show");
};

function calcRender(){
  document.getElementById("calcExprLine").innerHTML = calcExpr ? calcExpr : "&nbsp;";
}

function calcUpdateStatus(){
  document.getElementById("calcMemIndicator").innerText = "M: " + calcNumToDisplay(calcMemory);
  document.getElementById("calcModeIndicator").innerText = calcMode;
  document.getElementById("calcModeBtn").innerText = calcMode;
}

function calcNumToDisplay(n){
  const rounded = Math.round(n * 1e10) / 1e10;
  return rounded.toLocaleString("en-US", { maximumFractionDigits: 10, useGrouping: false });
}

window.calcToggleMode = function(){
  calcMode = calcMode === "DEG" ? "RAD" : "DEG";
  calcUpdateStatus();
};
window.calcMemClear = function(){
  calcMemory = 0;
  calcUpdateStatus();
};
window.calcMemRecall = function(){
  calcExpr += calcNumToDisplay(calcMemory);
  calcRender();
};
window.calcMemAdd = function(){
  const val = parseFloat(document.getElementById("calcResultLine").innerText.replace(/,/g, ""));
  if (!isNaN(val) && isFinite(val)) calcMemory += val;
  calcUpdateStatus();
};
window.calcMemSub = function(){
  const val = parseFloat(document.getElementById("calcResultLine").innerText.replace(/,/g, ""));
  if (!isNaN(val) && isFinite(val)) calcMemory -= val;
  calcUpdateStatus();
};
window.calcInsertAns = function(){
  calcExpr += calcNumToDisplay(calcAns);
  calcRender();
};

const CALC_OPS = ["+", "-", "×", "÷", "^"];
const CALC_POSTFIX = ["%", "²", "³", "!"];
const CALC_FUNC_TOKENS = ["asin(", "acos(", "atan(", "sin(", "cos(", "tan(", "log(", "ln(", "nPr(", "nCr(", "√(", "∛("];

window.calcInput = function(ch){
  const last = calcExpr.slice(-1);
  const endsWithFunc = CALC_FUNC_TOKENS.some(f => calcExpr.endsWith(f));
  const endsWithRecip = calcExpr.endsWith("⁻¹");
  const atStart = calcExpr === "" || last === "(" || endsWithFunc;

  // منع رقم عشري ثاني داخل نفس العدد (مثل 3.5.6)
  if (ch === "."){
    const seg = calcExpr.match(/[0-9]*\.?[0-9]*$/)[0];
    if (seg.includes(".")) return;
    if (seg === "") calcExpr += "0"; // .5 تصير 0.5
  }

  // منع بداية بعملية غير منطقية (× ÷ ^ في البداية)، السماح بـ "-" فقط كإشارة سالبة
  if (CALC_OPS.includes(ch)){
    if (atStart && ch !== "-") return; // إشارة سالبة مسموحة دائماً كبداية عدد، حتى داخل الأقواس أو الدوال (مثل sin(-30) أو √(-4))
    if (CALC_OPS.includes(last)) calcExpr = calcExpr.slice(0, -1); // استبدال آخر عملية بدل تكديسها
  }

  // % ² ³ ! يحتاجون عدد أو قوس مغلق أو نتيجة قبلهم
  if (CALC_POSTFIX.includes(ch)){
    if (calcExpr === "" || CALC_OPS.includes(last) || last === "(" || endsWithFunc || endsWithRecip) return;
  }

  // 1/x (⁻¹) نفس الشرط
  if (ch === "⁻¹"){
    if (calcExpr === "" || CALC_OPS.includes(last) || last === "(" || endsWithFunc) return;
  }

  // منع قوس إغلاق بدون قوس مفتوح مقابل له
  if (ch === ")"){
    const opens = (calcExpr.match(/\(/g) || []).length;
    const closes = (calcExpr.match(/\)/g) || []).length;
    if (closes >= opens || atStart) return;
  }

  // الفاصلة (لـ nPr و nCr) لا تُضاف في بداية المعادلة أو بعد عملية
  if (ch === ","){
    if (calcExpr === "" || CALC_OPS.includes(last) || last === "(" || last === ",") return;
  }

  calcExpr += ch;
  calcRender();
};
window.calcBackspace = function(){
  calcExpr = calcExpr.slice(0, -1);
  calcRender();
};
window.calcClear = function(){
  calcExpr = "";
  document.getElementById("calcResultLine").innerText = "0";
  calcRender();
};

function calcToRad(v){ return calcMode === "DEG" ? v * Math.PI / 180 : v; }
function calcFromRad(v){ return calcMode === "DEG" ? v * 180 / Math.PI : v; }

function calcFactorial(n){
  if (n < 0 || !Number.isInteger(n)) throw new Error("domain");
  if (n > 170) throw new Error("overflow");
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}
function calcNPR(n, r){
  if (!Number.isInteger(n) || !Number.isInteger(r) || n < 0 || r < 0 || r > n) throw new Error("domain");
  let res = 1;
  for (let i = 0; i < r; i++) res *= (n - i);
  return res;
}
function calcNCR(n, r){
  if (!Number.isInteger(n) || !Number.isInteger(r) || n < 0 || r < 0 || r > n) throw new Error("domain");
  return Math.round(calcNPR(n, r) / calcFactorial(r));
}

/* محلّل آمن للتعبيرات — بدون eval(). يدعم كل الدوال والعمليات المذكورة أعلاه مع فحص كامل لنطاقات كل دالة. */
function calcTokenize(str){
  const tokens = [];
  let i = 0;
  const multi = ["asin(", "acos(", "atan(", "sin(", "cos(", "tan(", "log(", "ln(", "nPr(", "nCr(", "√(", "∛("];
  while (i < str.length){
    const c = str[i];
    if (c === " "){ i++; continue; }
    let matched = false;
    for (let m = 0; m < multi.length; m++){
      const tok = multi[m];
      if (str.startsWith(tok, i)){
        tokens.push({ type: "func", name: tok.slice(0, -1) });
        tokens.push({ type: "(" });
        i += tok.length;
        matched = true;
        break;
      }
    }
    if (matched) continue;
    if (str.startsWith("⁻¹", i)){ tokens.push({ type: "recip" }); i += 2; continue; }
    if (/[0-9.]/.test(c)){
      let num = "";
      while (i < str.length && /[0-9.]/.test(str[i])){ num += str[i]; i++; }
      if ((num.match(/\./g) || []).length > 1) throw new Error("bad-number");
      tokens.push({ type: "num", value: parseFloat(num) });
      continue;
    }
    if (c === "π"){ tokens.push({ type: "num", value: Math.PI }); i++; continue; }
    if (c === "e"){ tokens.push({ type: "num", value: Math.E }); i++; continue; }
    if ("+-()%!²³,".includes(c)){ tokens.push({ type: c }); i++; continue; }
    if (c === "^"){ tokens.push({ type: "^" }); i++; continue; }
    if (c === "×"){ tokens.push({ type: "*" }); i++; continue; }
    if (c === "÷"){ tokens.push({ type: "/" }); i++; continue; }
    throw new Error("bad-char:" + c);
  }
  return tokens;
}

function calcParse(tokens){
  let pos = 0;
  const peek = () => tokens[pos];
  const next = () => tokens[pos++];
  const expect = (t) => { if (!peek() || peek().type !== t) throw new Error("syntax"); return next(); };

  function parseExpr(){
    let left = parseTerm();
    while (peek() && (peek().type === "+" || peek().type === "-")){
      const op = next().type;
      const right = parseTerm();
      left = op === "+" ? left + right : left - right;
    }
    return left;
  }
  function parseTerm(){
    let left = parseImplicit();
    while (peek() && (peek().type === "*" || peek().type === "/")){
      const op = next().type;
      const right = parseImplicit();
      if (op === "*") left = left * right;
      else { if (right === 0) throw new Error("div0"); left = left / right; }
    }
    return left;
  }
  // ضرب ضمني: 2π ، 3(4+1) ، π(3)
  function parseImplicit(){
    let left = parseUnary();
    while (peek() && (peek().type === "num" || peek().type === "(" || peek().type === "func")){
      const right = parseUnary();
      left = left * right;
    }
    return left;
  }
  function parseUnary(){
    if (peek() && peek().type === "-"){ next(); return -parseUnary(); }
    if (peek() && peek().type === "+"){ next(); return parseUnary(); }
    return parsePower();
  }
  function parsePower(){
    const base = parsePostfix();
    if (peek() && peek().type === "^"){
      next();
      const exp = parseUnary(); // ترابط لليمين، يسمح بأس سالب
      const result = Math.pow(base, exp);
      if (!isFinite(result)) throw new Error("domain");
      return result;
    }
    return base;
  }
  function parsePostfix(){
    let val = parsePrimary();
    while (peek() && (peek().type === "%" || peek().type === "!" || peek().type === "²" || peek().type === "³" || peek().type === "recip")){
      const op = next().type;
      if (op === "%") val = val / 100;
      else if (op === "!") val = calcFactorial(val);
      else if (op === "²") val = val * val;
      else if (op === "³") val = val * val * val;
      else if (op === "recip"){ if (val === 0) throw new Error("div0"); val = 1 / val; }
    }
    return val;
  }
  function parsePrimary(){
    const t = peek();
    if (!t) throw new Error("unexpected-end");
    if (t.type === "num"){ next(); return t.value; }
    if (t.type === "("){
      next();
      const val = parseExpr();
      expect(")");
      return val;
    }
    if (t.type === "func"){
      next();
      expect("(");
      const name = t.name;
      if (name === "nPr" || name === "nCr"){
        const a = parseExpr();
        expect(",");
        const b = parseExpr();
        expect(")");
        return name === "nPr" ? calcNPR(a, b) : calcNCR(a, b);
      }
      const arg = parseExpr();
      expect(")");
      switch(name){
        case "√": if (arg < 0) throw new Error("domain"); return Math.sqrt(arg);
        case "∛": return Math.cbrt(arg);
        case "sin": return Math.sin(calcToRad(arg));
        case "cos": return Math.cos(calcToRad(arg));
        case "tan": {
          const rad = calcToRad(arg);
          if (Math.abs(Math.cos(rad)) < 1e-12) throw new Error("domain");
          return Math.tan(rad);
        }
        case "asin": if (arg < -1 || arg > 1) throw new Error("domain"); return calcFromRad(Math.asin(arg));
        case "acos": if (arg < -1 || arg > 1) throw new Error("domain"); return calcFromRad(Math.acos(arg));
        case "atan": return calcFromRad(Math.atan(arg));
        case "log": if (arg <= 0) throw new Error("domain"); return Math.log10(arg);
        case "ln": if (arg <= 0) throw new Error("domain"); return Math.log(arg);
        default: throw new Error("unknown-func");
      }
    }
    throw new Error("unexpected-token");
  }

  if (!tokens.length) return 0;
  const result = parseExpr();
  if (pos !== tokens.length) throw new Error("trailing");
  if (typeof result !== "number" || isNaN(result) || !isFinite(result)) throw new Error("domain");
  return result;
}

window.calcEquals = function(){
  if (!calcExpr){ return; }
  let expr = calcExpr;
  const lastChar = expr.slice(-1);
  const endsWithFunc = CALC_FUNC_TOKENS.some(f => expr.endsWith(f));
  // منع إنهاء المعادلة بعملية معلّقة (مثل 5+) قبل حتى محاولة الحساب
  if (CALC_OPS.includes(lastChar) || lastChar === "(" || endsWithFunc || lastChar === ","){
    document.getElementById("calcResultLine").innerText = "خطأ";
    return;
  }
  // إغلاق تلقائي للأقواس الناقصة (مثل الآلات الحاسبة العلمية الحقيقية)
  const opens = (expr.match(/\(/g) || []).length;
  const closes = (expr.match(/\)/g) || []).length;
  if (opens > closes) expr += ")".repeat(opens - closes);

  try{
    const result = calcParse(calcTokenize(expr));
    if (!isFinite(result) || isNaN(result)) throw new Error("invalid");
    const rounded = Math.round(result * 1e10) / 1e10;
    calcAns = rounded;
    document.getElementById("calcResultLine").innerText = rounded.toLocaleString("en-US", { maximumFractionDigits: 10, useGrouping: false });
  }catch(e){
    document.getElementById("calcResultLine").innerText = "خطأ";
  }
};
</script>
