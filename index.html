<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العداد التنازلي للقناة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 400px;
        }
        h2 { margin-bottom: 20px; color: #38bdf8; }
        .timer {
            display: flex;
            justify-content: space-around;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .time-box {
            background: #0f172a;
            padding: 10px 15px;
            border-radius: 8px;
            min-width: 50px;
        }
        .label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>الحدث يبدأ خلال</h2>
        <div class="timer" id="countdown">
            <div>
                <div class="time-box" id="days">00</div>
                <div class="label">يوم</div>
            </div>
            <div>
                <div class="time-box" id="hours">00</div>
                <div class="label">ساعة</div>
            </div>
            <div>
                <div class="time-box" id="minutes">00</div>
                <div class="label">دقيقة</div>
            </div>
            <div>
                <div class="time-box" id="seconds">00</div>
                <div class="label">ثانية</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        let tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let targetTime = 0;

        // ج الاستماع المباشر للوقت المحدث من قاعدة البيانات
        onValue(ref(db, 'countdown/targetTime'), (snapshot) => {
            targetTime = snapshot.val();
        });

        function updateCountdown() {
            if (!targetTime) return;
            const now = new Date().getTime();
            const difference = targetTime - now;

            if (difference <= 0) {
                document.getElementById("countdown").innerHTML = "انتهى الوقت المحدد!";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
